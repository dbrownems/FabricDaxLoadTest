name: Release

# Cuts a GitHub Release with the artifacts needed for the manual setup
# path documented in README.md. Trigger on a version tag:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Or run manually via workflow_dispatch with a tag input.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0). Must already exist on the branch.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install notebook + build deps
        run: pip install nbformat build setuptools setuptools-scm wheel

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          # setuptools-scm strips the leading `v` from the git tag for
          # PEP 440 compliance — the wheel filename uses the bare version.
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Publish LoadGen (linux-x64, framework-dependent)
        # Same flags as scripts/Deploy-LoadTests.ps1 — Fabric Spark hosts
        # have the .NET 8 runtime bundled via sempy. UseAppHost=false skips
        # the per-RID native binary so no chmod is required after upload.
        run: |
          dotnet publish src/LoadGen/LoadGen.csproj \
            -c Release -r linux-x64 \
            -p:SelfContained=false \
            -p:PublishSingleFile=false \
            -p:UseAppHost=false \
            --nologo

      - name: Stage LoadGen binaries into wheel source tree
        # As of v0.5.0 the LoadGen DLLs ship inside the fdlt_runtime
        # wheel. pyproject.toml's [tool.setuptools.package-data] picks
        # up everything under src/fdlt_runtime/loadgen/ — so we copy
        # the publish output there before `python -m build`.
        run: |
          rm -rf src/fdlt_runtime/loadgen
          mkdir -p src/fdlt_runtime/loadgen
          cp -r src/LoadGen/bin/Release/net8.0/linux-x64/publish/. \
                src/fdlt_runtime/loadgen/
          ls -lh src/fdlt_runtime/loadgen/

      - name: Build fdlt_runtime wheel
        # setuptools-scm reads the version from `git describe`, which on a
        # tagged commit is exactly the tag (e.g. 0.5.0). The deploy script
        # does the same locally; both wheel filenames match the tag.
        run: |
          python -m build --wheel --no-isolation
          ls -lh dist/

      - name: Verify wheel contents
        # Catch the silent-stale-wheel failure mode early: if the
        # package-data glob ever fails, a 50 KiB wheel without LoadGen
        # would happily ship and only break at the user's first
        # Run-All. Fail the workflow instead.
        run: |
          set -e
          tmp=$(mktemp -d)
          unzip -q dist/fdlt_runtime-*.whl -d "$tmp"
          for f in \
              fdlt_runtime/loadgen/LoadGen.dll \
              fdlt_runtime/loadgen/LoadGen.deps.json \
              fdlt_runtime/loadgen/LoadGen.runtimeconfig.json \
              fdlt_runtime/loadgen/QueryRunner.dll \
              fdlt_runtime/loadgen/Microsoft.AnalysisServices.AdomdClient.dll \
              fdlt_runtime/notebook.py; do
            test -f "$tmp/$f" || { echo "Missing $f"; exit 1; }
          done
          echo "✅ Wheel content verified"

      - name: Regenerate notebooks
        # FDLT_RELEASE_VERSION drives the WHEEL_URL embedded in cell 2.
        # Using the bare version (without the leading `v`) so the URL
        # matches the wheel filename: fdlt_runtime-X.Y.Z-py3-none-any.whl.
        env:
          FDLT_RELEASE_VERSION: ${{ steps.tag.outputs.version }}
        run: python scripts/build_notebooks.py

      - name: Stage release assets
        run: |
          cp dist/fdlt_runtime-*.whl ./
          cp notebooks/LoadTest-Main.ipynb ./LoadTest-Main.ipynb
          ls -lh fdlt_runtime-*.whl LoadTest-Main.ipynb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            fdlt_runtime-*.whl
            LoadTest-Main.ipynb
            THIRD-PARTY-NOTICES.md
          body: |
            **Manual-deployment artifacts** (see [README — Option B: Manual setup](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.name }}/README.md#option-b--manual-setup)).

            | Asset | Where it goes |
            |---|---|
            | `fdlt_runtime-${{ steps.tag.outputs.version }}-py3-none-any.whl` | Bundles `LoadGen.dll` + ADOMD assemblies. Cell 2 of the notebook `pip install`s this wheel directly from the GitHub release URL — no manual upload required (set `WHEEL_URL` in cell 2 to the asset URL). For offline / locked-down tenants, upload to `LoadTests.Lakehouse/Files/` and point `WHEEL_URL` at the `abfss://…` path instead. |
            | `LoadTest-Main.ipynb` | Import to the `LoadTests` workspace folder. The display name imports as **`LoadTest - Main`** automatically. Cell 2's `WHEEL_URL` is pre-baked to this release. |
            | `THIRD-PARTY-NOTICES.md` | License terms for the Microsoft AnalysisServices client + identity DLLs bundled inside the wheel. |

            For a scripted deploy (Option A), clone the repo at this tag and run `scripts/Deploy-LoadTests.ps1 -Workspace <name>`.
