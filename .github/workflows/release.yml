name: Release

# Cuts a GitHub Release with the artifacts needed for the manual setup
# path documented in README.md. Trigger on a version tag:
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Or run manually via workflow_dispatch with a tag input.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0). Must already exist on the branch.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install notebook + build deps
        run: pip install nbformat build setuptools setuptools-scm wheel

      - name: Publish LoadGen (linux-x64, framework-dependent)
        # Same flags as scripts/Deploy-LoadTests.ps1 — Fabric Spark hosts
        # have the .NET 8 runtime bundled via sempy. UseAppHost=false skips
        # the per-RID native binary so no chmod is required after upload.
        run: |
          dotnet publish src/LoadGen/LoadGen.csproj \
            -c Release -r linux-x64 \
            -p:SelfContained=false \
            -p:PublishSingleFile=false \
            -p:UseAppHost=false \
            --nologo

      - name: Build fdlt_runtime wheel
        # setuptools-scm reads the version from `git describe`, which on a
        # tagged commit is exactly the tag (e.g. 0.4.0). The deploy script
        # does the same locally; both wheel filenames match the tag.
        run: |
          python -m build --wheel --no-isolation
          ls -lh dist/

      - name: Regenerate notebooks
        # Build the .ipynb files from the in-repo Python source so the
        # release artifacts match the tagged commit deterministically,
        # regardless of whether contributors remembered to commit a fresh
        # regeneration.
        run: python scripts/build_notebooks.py

      - name: Package loadgen-bin.zip
        run: |
          stage="$RUNNER_TEMP/fdlt-zip-stage"
          mkdir -p "$stage"
          cp -r src/LoadGen/bin/Release/net8.0/linux-x64/publish/. "$stage/"
          cp dist/fdlt_runtime-*.whl "$stage/"
          (cd "$stage" && zip -r "$GITHUB_WORKSPACE/loadgen-bin.zip" .)
          ls -lh "$GITHUB_WORKSPACE/loadgen-bin.zip"

      - name: Stage notebook + LoadGen zip
        run: |
          cp notebooks/LoadTest-Template.ipynb ./LoadTest-Template.ipynb
          ls -l LoadTest-Template.ipynb loadgen-bin.zip

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            loadgen-bin.zip
            LoadTest-Template.ipynb
          body: |
            **Manual-deployment artifacts** (see [README — Option B: Manual setup](https://github.com/${{ github.repository }}/blob/${{ steps.tag.outputs.name }}/README.md#option-b--manual-setup)).

            | Asset | Where it goes |
            |---|---|
            | `loadgen-bin.zip` | Upload as-is to `LoadTests.Lakehouse/Files/loadgen-bin.zip` (cell 2 of the notebook unzips it on each kernel start). |
            | `LoadTest-Template.ipynb` | Import to the `LoadTests` workspace folder. The display name imports as **`LoadTest - Template`** automatically. |

            For a scripted deploy (Option A), clone the repo at this tag and run `scripts/Deploy-LoadTests.ps1 -Workspace <name>`.
